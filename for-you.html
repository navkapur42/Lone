<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>for-you</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:     #E8405A;
      --blush:    #F9A8C0;
      --petal:    #FDE8EF;
      --mauve:    #C2607A;
      --cream:    #FFF6F9;
      --ink:      #2A1520;
      --muted:    #9A6070;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      color: var(--ink);
    }

    /* ── Canvas of floating hearts ── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Central card ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(232, 64, 90, 0.18);
      border-radius: 2.5rem;
      padding: 3.5rem 3rem 3rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(194, 96, 122, 0.18), 0 1px 4px rgba(0,0,0,0.06);
      opacity: 0;
      transform: translateY(30px) scale(0.96);
      animation: cardIn 1.1s cubic-bezier(.22,.68,0,1.2) 0.4s forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Big hero heart ── */
    .hero-heart {
      display: inline-block;
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 1.6rem;
      opacity: 0;
      transform: scale(0);
      animation: popHeart 0.7s cubic-bezier(.34,1.56,.64,1) 1.2s forwards;
      filter: drop-shadow(0 4px 18px rgba(232,64,90,0.4));
    }

    @keyframes popHeart {
      to { opacity: 1; transform: scale(1); }
    }

    /* Continuous pulse on hero heart */
    .hero-heart.alive {
      animation: popHeart 0.7s cubic-bezier(.34,1.56,.64,1) 1.2s forwards,
                 pulse 2.2s ease-in-out 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    /* ── Typography ── */
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.7s forwards;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--rose);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.9s forwards;
    }

    .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 3vw, 1.08rem);
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 2.1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Divider of tiny hearts ── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 2.3s forwards;
    }

    .divider span {
      font-size: 0.75rem;
      opacity: 0.4;
      animation: divHeartPop 0.4s ease backwards;
    }
    .divider span:nth-child(1) { animation-delay: 2.4s; }
    .divider span:nth-child(2) { animation-delay: 2.55s; font-size: 1rem; opacity: 0.7; }
    .divider span:nth-child(3) { animation-delay: 2.4s; }

    @keyframes divHeartPop {
      from { transform: scale(0); opacity: 0; }
      to   { opacity: inherit; transform: scale(1); }
    }

    /* ── Reveal message ── */
    .message-wrap {
      opacity: 0;
      animation: fadeUp 0.9s ease 2.5s forwards;
    }

    .message {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.92rem;
      color: var(--ink);
      line-height: 1.8;
      letter-spacing: 0.01em;
    }

    .message strong {
      font-weight: 400;
      color: var(--rose);
    }

    /* ── Signature ── */
    .signature {
      margin-top: 2rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--mauve);
      opacity: 0;
      animation: fadeUp 0.8s ease 2.9s forwards;
    }

    /* ── Floating hearts (JS-driven) ── */
    .fheart {
      position: absolute;
      pointer-events: none;
      user-select: none;
      line-height: 1;
      will-change: transform, opacity;
      animation: floatUp var(--dur) ease-in var(--delay) forwards;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(var(--rot)) scale(0.3); opacity: 0; }
      10%  { opacity: 0.9; transform: translateY(-8vh) rotate(calc(var(--rot) + 5deg)) scale(1); }
      80%  { opacity: 0.7; }
      100% { transform: translateY(-92vh) rotate(calc(var(--rot) + 20deg)) scale(0.7); opacity: 0; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .card, .hero-heart, .eyebrow, .headline, .sub, .divider, .message-wrap, .signature {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .fheart { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="stage">
    <div class="card">
      <div class="hero-heart alive">💗</div>
      <p class="eyebrow">a little confession</p>
      <h1 class="headline">I Like You</h1>
      <p class="sub">more than words can quietly hold.</p>

      <div class="divider">
        <span>♡</span>
        <span>♥</span>
        <span>♡</span>
      </div>

      <div class="message-wrap">
        <p class="message">
          There's something about you that makes<br>
          <strong>ordinary moments</strong> feel a little brighter.<br><br>
          I just wanted you to know —<br>
          <strong>you matter to me.</strong>
        </p>
      </div>

      <p class="signature">— with a full heart 💕</p>
    </div>
  </div>

  <script>
    /* ── Soft pink gradient background on canvas ── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      drawBG();
    }

    function drawBG() {
      const grd = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.3, 0,
        canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.85
      );
      grd.addColorStop(0,   '#FFE4EE');
      grd.addColorStop(0.5, '#FDD9E8');
      grd.addColorStop(1,   '#F9C5D8');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* ── Floating hearts spawner ── */
    const EMOJIS  = ['💗','💕','💓','💞','♥','❤️','🩷','💖'];
    const SIZES   = [14, 18, 22, 28, 34];
    const container = document.body;

    function spawnHeart() {
      const el = document.createElement('span');
      el.classList.add('fheart');
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

      const size  = SIZES[Math.floor(Math.random() * SIZES.length)];
      const left  = Math.random() * 96 + 2;         // 2–98 vw
      const dur   = (4 + Math.random() * 5).toFixed(2);
      const delay = (Math.random() * 1.5).toFixed(2);
      const rot   = ((Math.random() - 0.5) * 30).toFixed(1) + 'deg';

      el.style.cssText = `
        left: ${left}vw;
        bottom: -4vh;
        font-size: ${size}px;
        --dur: ${dur}s;
        --delay: ${delay}s;
        --rot: ${rot};
      `;

      container.appendChild(el);
      // Remove after animation ends
      el.addEventListener('animationend', () => el.remove());
    }

    // Start spawning after card is visible
    setTimeout(() => {
      spawnHeart(); // immediate first burst
      for (let i = 0; i < 5; i++) spawnHeart();
      setInterval(() => {
        const n = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < n; i++) spawnHeart();
      }, 900);
    }, 2000);

    /* ── Tap / click anywhere to burst hearts ── */
    document.addEventListener('pointerdown', (e) => {
      for (let i = 0; i < 7; i++) {
        const el = document.createElement('span');
        el.classList.add('fheart');
        el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

        const size  = SIZES[Math.floor(Math.random() * SIZES.length)];
        const rot   = ((Math.random() - 0.5) * 40).toFixed(1) + 'deg';
        const dx    = ((Math.random() - 0.5) * 120).toFixed(0);
        const dur   = (2.5 + Math.random() * 2).toFixed(2);
        const delay = (Math.random() * 0.3).toFixed(2);

        el.style.cssText = `
          left: ${e.clientX + parseInt(dx)}px;
          bottom: ${window.innerHeight - e.clientY}px;
          font-size: ${size}px;
          --dur: ${dur}s;
          --delay: ${delay}s;
          --rot: ${rot};
        `;
        container.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    });
  </script>
</body>
</html>
